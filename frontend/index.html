<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>ChatFlow</title>

  <link rel="stylesheet" href="style.css"/>

</head>

<body>

  <div class="bg-grid"></div>

  <div class="background-blur blur1"></div>
  <div class="background-blur blur2"></div>
  <div class="background-blur blur3"></div>

  <!-- JOIN SCREEN -->

  <div id="username-modal" class="username-modal">

    <div class="username-box">

      <div class="logo"></div>

      <h1>CHATFLOW</h1>

      <p>Realtime Neural Interface</p>

      <input
        type="text"
        id="username-input"
        placeholder="Choose your identity..."
      />

      <button id="join-btn">
        Enter Chat
      </button>

    </div>

  </div>

  <!-- CHAT APP -->

  <div class="chat-container">

    <div class="chat-header">

      <div class="logo-section">

        <div class="logo-box"></div>

        <div>

          <h1>CHATFLOW</h1>

          <p>Realtime Neural Interface</p>

        </div>

      </div>

      <div class="online-box">

        <span class="online-dot"></span>

        <span id="online-users">0 Online</span>

      </div>

    </div>

    <div id="message-container" class="messages"></div>

    <div class="chat-input-area">

      <input
        type="text"
        id="message-input"
        placeholder="Transmit message..."
        autocomplete="off"
      />

      <button id="send-btn">
        Send
      </button>

    </div>

  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

  <script src="script.js"></script>

</body>

</html>
